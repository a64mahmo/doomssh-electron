name: Auto-Versioning (Merge to Main)

on:
  push:
    branches:
      - main

jobs:
  version:
    # Skip if the commit message contains [skip ci] or was created by the bot
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for versioning
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm run frontend:install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Frontend Unit Tests
        run: npm test --prefix frontend

      - name: Run Playwright Suites (Chromium Only)
        run: npx playwright test tests/e2e tests/visual tests/performance tests/regression tests/integration --project=chromium

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        run: |
          # Ensure we have all tags
          git fetch --tags --force
          
          # Get the latest tag, default to v0.0.0 if none exist
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Current latest tag: $LATEST_TAG"
          
          # Strip 'v' prefix and split into components
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a parts <<< "$VERSION"
          MAJOR=${parts[0]:-0}
          MINOR=${parts[1]:-0}
          PATCH=${parts[2]:-0}
          
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" == *"#major"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$MSG" == *"#minor"* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Calculated new version: $NEW_VERSION"
          
          # Stage any environment changes (e.g. package-lock updates)
          git add .
          
          # Set the version explicitly. --force handles dirty working dir.
          # [skip ci] prevents recursive workflow triggers.
          npm version "$NEW_VERSION" --force -m "chore(release): v%s [skip ci]"
          
          # Push the commit and the new tag back to main
          git push origin main --follow-tags
