name: Auto-Versioning (Merge to Main)

on:
  push:
    branches:
      - main

jobs:
  version:
    # Skip if the commit message contains [skip ci] or was created by the bot
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for versioning
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm run frontend:install

      - name: Run All Tests
        run: npm run test:all

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          BUMP="patch"
          if [[ "$MSG" == *"#major"* ]]; then
            BUMP="major"
          elif [[ "$MSG" == *"#minor"* ]]; then
            BUMP="minor"
          fi
          
          echo "Bumping version: $BUMP"
          
          # Use npm version to update package.json, commit, and tag
          # The [skip ci] prevents an infinite loop
          NEW_VERSION=$(npm version $BUMP -m "chore(release): v%s [skip ci]")
          
          # Push the commit and the tag
          git push origin main --follow-tags
